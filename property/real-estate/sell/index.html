<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section class="sell-section">

  <!-- HEADER -->
  <div class="sell-header">
    <img src="Algotrick & Realty l.png" class="sell-logo">
    <h2>Sell Your Property</h2>
    <p>List your property with ease and connect with genuine buyers</p>
  </div>

  <!-- FORM -->
  <form class="sell-form" id="sellForm">

    <input type="text" placeholder="Property Title" required>

    <input type="text" placeholder="Location (e.g. Gurgaon, Dehradun)" required>

    <input type="number" placeholder="Price (₹)" required>

    <input type="text" placeholder="Area (sq ft)" required>

    <select required>
      <option value="">Property Type</option>
      <option>Villa</option>
      <option>Apartment</option>
      <option>Plot</option>
    </select>

    <select required>
      <option value="">Bedrooms</option>
      <option>1</option>
      <option>2</option>
      <option>3</option>
      <option>4</option>
      <option>5+</option>
    </select>

    <select required>
      <option value="">Bathrooms</option>
      <option>1</option>
      <option>2</option>
      <option>3</option>
      <option>4+</option>
    </select>

    <input type="file" accept="image/*">

    <button type="submit">Submit Property</button>

  </form>

</section>

<!-- FOOTER -->
<section class="sell-footer">

  <h2>Sell Smart. Sell Fast.</h2>

  <p>
    With <strong>Algotrick & Realty</strong>, you can list your property 
    and reach thousands of potential buyers across Gurgaon, Uttarakhand, 
    Haridwar and beyond. We ensure maximum visibility and genuine leads.
  </p>

  <button class="contact-btn">Get Assistance</button>

</section>
<script src="script.js"></script>
</body>
</html>
